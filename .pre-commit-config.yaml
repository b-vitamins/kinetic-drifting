repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: ruff format --check .
        language: system
        pass_filenames: false
      - id: pyright
        name: pyright
        entry: pyright
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: env PYTHONDONTWRITEBYTECODE=1 pytest -o cache_dir=/tmp/kdrifting-pytest-cache
        language: system
        pass_filenames: false
